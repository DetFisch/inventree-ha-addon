name: Build And Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build.yml"
      - "inventree/**"
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "inventree/**"
  workflow_dispatch:

jobs:
  build:
    name: Build inventree (${{ matrix.ha_arch }})
    runs-on: ${{ matrix.ha_arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha_arch: amd64
            docker_platform: linux/amd64
          - ha_arch: aarch64
            docker_platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read add-on version
        id: version
        run: |
          VERSION="$(sed -n 's/^version:[[:space:]]*"\{0,1\}\([^"]\+\)"\{0,1\}$/\1/p' inventree/config.yaml | head -n1)"
          if [ -z "${VERSION}" ]; then
            echo "Could not read version from inventree/config.yaml" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build date
        id: build_date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Normalize image owner
        id: image_owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image_owner.outputs.value }}/home-assistant-inventree-${{ matrix.ha_arch }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: inventree
          file: inventree/Dockerfile
          platforms: ${{ matrix.docker_platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_ARCH=${{ matrix.ha_arch }}
            BUILD_DATE=${{ steps.build_date.outputs.value }}
            BUILD_DESCRIPTION=InvenTree server for Home Assistant
            BUILD_NAME=InvenTree
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
